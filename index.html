<!DOCTYPE html>
<html>

<head>

    <title>EBONG CHA MENU</title>

    <script type="module"
        src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>

body{
    margin:0;
    padding:20px;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    color:#222;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
}

.card{
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

model-viewer{
    width:100%;
    height:450px;
    background:#f8f8f8;
    border-radius:15px;
}

#itemTitle{
    font-size:30px;
    margin-top:15px;
}

#itemPrice{
    color:#e63946;
    font-size:24px;
    font-weight:bold;
}

#description{
    color:#555;
    font-size:18px;
}

#ar-button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

.buttons{
    margin-top:20px;
}

.buttons button{
    margin:8px;
    padding:12px 20px;
    border:none;
    border-radius:30px;
    background:#28a745;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

.buttons button:hover{
    background:#dc3545;
    transform:scale(1.05);
}

@media(max-width:768px){

model-viewer{
height:320px;
}

.buttons button{
width:90%;
font-size:18px;
}

}
#addCartButton{
    background:#28a745;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

#addCartButton:hover{
    background:#dc3545;
    transform:scale(1.05);
}

    </style>

</head>

<body>

<div class="container">

<h1>EBONG CHA MENU</h1>

<p class="subtitle">
Select your favorite food and view it in AR
</p>

<div class="card">

<model-viewer
id="viewer"
src="pizza.glb"
camera-controls
auto-rotate
ar
ar-modes="webxr scene-viewer quick-look"
shadow-intensity="1">

<button slot="ar-button" id="ar-button">
📱 View in AR
</button>

</model-viewer>

<h2 id="itemTitle">🍕 Pizza</h2>

<h3 id="itemPrice">₹250</h3>

<p id="description">
Delicious Italian Pizza
</p>
<button id="addCartButton"
onclick="addCurrentItem()">
🛒 Add to Cart
</button>

<div class="buttons">
    <hr>

<h2>🛒 Your Order</h2>

<div id="cart">
    <p>No items added.</p>
</div>

<h3>Total : ₹<span id="total">0</span></h3>

<label><b>Table No.</b></label>

<br><br>

<input
type="number"
id="tableNumber"
placeholder="Enter Table Number">

<br><br>

<button id="placeOrder"
onclick="placeOrder()">
📲 Place Order
</button>

<br><br>

<!-- Pizza -->
<button onclick="changeModel('pizza.glb','🍕 Pizza','₹250','Delicious Italian Pizza')">
🍕 Pizza
</button>

<button onclick="changeModel('burger.glb','🍔 Burger','₹300','Juicy Burger with crispy vegetables')">
🍔 Burger
</button>

 <button onclick="changeModel('drink.glb','🥤 Drink','₹50','Refreshing cold drink')">
🥤 Drink
</button>

<button onclick="changeModel('french_fries.glb','🍟 French Fries','₹100','Golden crispy french fries')">
🍟 French Fries
</button>

<button onclick="changeModel('ice_cream.glb','🍦 Ice Cream','₹150','Sweet creamy ice cream')">
🍦 Ice Cream
</button>

<button onclick="changeModel('dessert.glb','🍰 Dessert','₹200','Special chef dessert')">
🍰 Dessert
</button>

<button onclick="changeModel('spicy_ramen_noodle.glb','🍜 Spicy Ramen','₹220','Hot and spicy ramen noodles')">
🍜 Spicy Ramen
</button>

<button onclick="changeModel('sandwich.glb','🥪 Sandwich','₹200','Hot and tasty sandwich')">
    🥪SandWich
</button>

<button onclick="changeModel('tea.glb','☕ Hot Tea','₹40','Hot and sweet tea')">
☕ Hot Tea
</button>

</div>
    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyCf2tT-amndxo9eC6vjFwufy-RKuI1sCE8",
  authDomain: "ebong-cha.firebaseapp.com",
  databaseURL: "https://ebong-cha-default-rtdb.firebaseio.com",
  projectId: "ebong-cha",
  storageBucket: "ebong-cha.firebasestorage.app",
  messagingSenderId: "449466575689",
  appId: "1:449466575689:web:41d81d8c03c04d36970898",
  measurementId: "G-QR3HXQR4GD"
};
const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

let currentItem = "🍕 Pizza";
let currentPrice = 250;

let cart = [];
let total = 0;

function changeModel(modelName, title, price, description){

    const viewer = document.getElementById("viewer");
    const itemTitle = document.getElementById("itemTitle");
    const itemPrice = document.getElementById("itemPrice");
    const itemDescription = document.getElementById("description");

    viewer.src = modelName;
    itemTitle.innerHTML = title;
    itemPrice.innerHTML = price;
    itemDescription.innerHTML = description;

    currentItem = title;
    currentPrice = parseInt(price.replace("₹",""));

}

function addCurrentItem(){

    cart.push({
        name: currentItem,
        price: currentPrice
    });

    total += currentPrice;

    document.getElementById("total").innerHTML = total;

    let cartHTML = "";

    for(let i = 0; i < cart.length; i++){

     cartHTML += "<p>" +
cart[i].name +
" - ₹" +
cart[i].price +
" <button onclick='removeItem(" + i + ")'>❌</button></p>";

    }

    document.getElementById("cart").innerHTML = cartHTML;

}
function removeItem(index){

    total -= cart[index].price;

    cart.splice(index,1);

    document.getElementById("total").innerHTML = total;

    let cartHTML = "";

    if(cart.length == 0){

        cartHTML = "<p>No items added.</p>";

    }else{

        for(let i=0;i<cart.length;i++){

            cartHTML += "<p>" +
            cart[i].name +
            " - ₹" +
            cart[i].price +
            " <button onclick='removeItem(" + i + ")'>❌</button></p>";

        }

    }

    document.getElementById("cart").innerHTML = cartHTML;

}

function placeOrder(){

    let table = document.getElementById("tableNumber").value;

    if(table == ""){
        alert("Please Enter Table Number");
        return;
    }

    if(cart.length == 0){
        alert("Please Add Items");
        return;
    }

    let order = {
        table: table,
        items: cart,
        total: total,
        status:"😶pending"
    };

    order.time = new Date().toLocaleString();

    console.log(order);
    alert(JSON.stringify(order));
    push(ref(database,"orders"),order);

    alert("Order Ready!");


}

window.changeModel = changeModel;
window.addCurrentItem = addCurrentItem;
window.placeOrder = placeOrder;
window.removeItem = removeItem;

</script>

</div>

</body>

</html>
